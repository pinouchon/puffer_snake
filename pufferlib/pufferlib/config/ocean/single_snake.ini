[base]
package = ocean
env_name = puffer_single_snake
policy_name = Snake
rnn_name = None

[env]
num_envs = 512
width = 10
height = 10
num_snakes = 1
num_food = 1
vision = 5
leave_corpse_on_death = False
reward_food = 1.0
reward_step = -0.01
reward_corpse = 0.0
reward_death = -1.0
use_potential_shaping = True
potential_shaping_coef = 0.05
max_episode_steps = 400

[vec]
num_envs = 8

[policy]
cnn_channels = 32
hidden_size = 128

[train]
total_timesteps = 90_000_000
optimizer = adam
anneal_lr = False
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 1e-8
bptt_horizon = 64
clip_coef = 0.2
ent_coef = 0.001
gae_lambda = 0.95
gamma = 0.99
learning_rate = 0.0003
max_grad_norm = 0.5
minibatch_size = 32768
stats_log_interval = 5_000_000
stats_log_path = ""
prio_alpha = 0.6082618023318664
prio_beta0 = 0.447524297405661
vf_clip_coef = 0.2
vf_coef = 0.5
vtrace_c_clip = 0
vtrace_rho_clip = 0.9285200248552337

[sweep.env.reward_food]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.0
scale = auto

[sweep.env.reward_death]
distribution = uniform
min = -20.0
max = 0.0
mean = 0.0
scale = auto

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e7
max = 2e8
mean = 1e8
scale = auto
