[base]
package = ocean
env_name = puffer_single_snake_v2
policy_name = Snake
rnn_name = None

[env]
num_envs = 512
width = 5
height = 5
num_food = 1
reward_food = 1.0
reward_step = -0.003
reward_death = -1.0
use_potential_shaping = False
shape_on_eat = False
potential_shaping_coef = 0.0
max_episode_steps = 800
max_snake_length = 25
report_interval = 128

[vec]
num_envs = 8

[policy]
cnn_channels = 16
hidden_size = 64

[train]
total_timesteps = 70_000_000
optimizer = adam
anneal_lr = False
learning_rate = 0.00030
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 1e-8
update_epochs = 2
bptt_horizon = 64
minibatch_size = 16384
clip_coef = 0.12
ent_coef = 0.0015
gae_lambda = 0.95
gamma = 0.995
max_grad_norm = 0.5
vf_clip_coef = 0.2
vf_coef = 0.75
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
stats_log_interval = 5_000_000
stats_log_path = ""
prio_alpha = 0.6082618023318664
prio_beta0 = 0.447524297405661
