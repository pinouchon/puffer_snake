[base]
package = ocean
env_name = puffer_single_snake_v1
policy_name = SingleSnakeV1Policy
rnn_name = None

[env]
num_envs = 3072
width = 8
height = 8
reward_food = 1.0
reward_step = -0.003
reward_death = -1.0
max_episode_steps = 1000
report_interval = 256

[vec]
backend = PufferEnv
num_envs = 1

[policy]
cnn_channels = 32
hidden_size = 128

[train]
total_timesteps = 80_000_000
optimizer = adam
anneal_lr = False
learning_rate = 0.0022
min_lr_ratio = 0.1
update_epochs = 1
bptt_horizon = 64
minibatch_size = 8192
clip_coef = 0.12
ent_coef = 0.0001
gae_lambda = 0.97
gamma = 0.997
max_grad_norm = 0.5
vf_clip_coef = 0.2
vf_coef = 0.75
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
stats_log_interval = 2_000_000
stats_log_path = ""
prio_alpha = 0.6082618023318664
prio_beta0 = 0.447524297405661
recompute_advantages_per_minibatch = False
