[base]
package = ocean
env_name = puffer_single_snake_v1
policy_name = SingleSnakeV1Policy
rnn_name = None

[env]
num_envs = 4096
width = 8
height = 8
reward_food = 1.0
reward_step = -0.003
reward_death = -1.0
max_episode_steps = 1000
report_interval = 256

[vec]
backend = PufferEnv
num_envs = 1

[policy]
cnn_channels = 32
hidden_size = 128

[train]
total_timesteps = 30_080_548
optimizer = adam
anneal_lr = False
learning_rate = 0.0021585990625102125
min_lr_ratio = 0.1
update_epochs = 1
bptt_horizon = 32
minibatch_size = 8192
clip_coef = 0.1758868095026977
ent_coef = 0.0001
gae_lambda = 0.944
gamma = 0.9940711103165775
max_grad_norm = 0.5087626236773275
vf_clip_coef = 0.15470946293822643
vf_coef = 0.6108216342676894
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
stats_log_interval = 2_000_000
stats_log_path = ""
sweep_log_start_fraction = 0.0
sweep_log_start_max_steps = 0
prio_alpha = 0.5551867470045929
prio_beta0 = 0.38
recompute_advantages_per_minibatch = False

[sweep]
method = Protein
metric = score
metric_distribution = linear
goal = maximize
downsample = 1
use_gpu = True
prune_pareto = True
max_suggestion_cost = 35
early_stop_quantile = 0.3
sweep_only = total_timesteps, learning_rate, gamma, gae_lambda, clip_coef, vf_clip_coef, vf_coef, max_grad_norm, prio_alpha, prio_beta0

[sweep.train.total_timesteps]
distribution = log_normal
min = 20_000_000
max = 32_000_000
scale = time

[sweep.train.learning_rate]
distribution = log_normal
min = 0.00195
max = 0.00218
scale = 0.20

[sweep.train.gamma]
distribution = logit_normal
min = 0.9938
max = 0.9948
scale = auto

[sweep.train.gae_lambda]
distribution = logit_normal
min = 0.944
max = 0.970
scale = auto

[sweep.train.clip_coef]
distribution = uniform
min = 0.150
max = 0.178
scale = auto

[sweep.train.vf_clip_coef]
distribution = uniform
min = 0.12
max = 0.175
scale = auto

[sweep.train.vf_coef]
distribution = uniform
min = 0.60
max = 0.90
scale = auto

[sweep.train.max_grad_norm]
distribution = uniform
min = 0.42
max = 0.54
scale = auto

[sweep.train.prio_alpha]
distribution = logit_normal
min = 0.40
max = 0.56
scale = auto

[sweep.train.prio_beta0]
distribution = logit_normal
min = 0.38
max = 0.50
scale = auto
